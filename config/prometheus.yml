global:
  scrape_interval: 15s
  scrape_timeout: 10s
scrape_configs:
  # scrapping des données de prometheus lui-même
  - job_name: scrap_prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: scrap_windows
    static_configs:
      - targets: ['host.docker.internal:9182']
  - job_name: scrap_mssql
    static_configs:
      - targets: ['mssql_exporter:4000']
  - job_name: scrap_asp_pizzashop
    static_configs:
      - targets: ['pizza-shop:8080']
  - job_name: scrap_mongo
    static_configs:
      - targets: ['mongodb_exporter:9216']
  - job_name: scrap_node
    static_configs:
      - targets: ['node_orders:3000']
  - job_name: scrap_docker
    static_configs:
      - targets: ['cadvisor:8080']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alert-manager:9093']

rule_files:
  - cpu_too_high.rule.yml